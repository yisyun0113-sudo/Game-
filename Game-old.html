<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>高塔迴聲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0b0d10;
    --panel:#15191e;
    --panel-raised:#1c2129;
    --line:#2a313b;
    --ink:#d6dbe0;
    --ink-dim:#7d8894;
    --parchment:#e9ddc2;
    --teal:#5fb3a3;
    --amber:#c9973f;
    --red:#b23b3b;
    --mono: 'Space Mono', monospace;
    --serif: 'Lora', serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--void);color:var(--ink);font-family:var(--serif);}
  body{min-height:100vh;display:flex;justify-content:center;}
  #app{width:100%;max-width:960px;display:flex;min-height:100vh;}

  /* -------- 左側：塔層垂直軸（signature element） -------- */
  #shaft{
    width:64px;flex-shrink:0;position:relative;
    border-right:1px solid var(--line);
    padding:24px 0;display:flex;flex-direction:column;align-items:center;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent 30%);
  }
  #shaft .shaft-line{
    position:absolute;top:24px;bottom:24px;left:50%;width:1px;
    background:var(--line);transform:translateX(-50%);
  }
  #shaft-ticks{position:relative;z-index:1;display:flex;flex-direction:column;gap:0;width:100%;align-items:center;}
  .tick{
    font-family:var(--mono);font-size:10px;color:var(--ink-dim);
    width:28px;height:24px;display:flex;align-items:center;justify-content:center;
    border-radius:3px;transition:all .25s ease;
  }
  .tick.done{color:#3d4650;}
  .tick.current{
    color:var(--void);background:var(--teal);font-weight:700;
    box-shadow:0 0 12px rgba(95,179,163,.6);
  }

  /* -------- 右側主內容 -------- */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;}

  #statusbar{
    display:flex;flex-wrap:wrap;gap:0;
    border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:11px;letter-spacing:.03em;
  }
  .stat{
    padding:10px 14px;border-right:1px solid var(--line);color:var(--ink-dim);
    display:flex;gap:6px;align-items:baseline;
  }
  .stat b{color:var(--ink);font-size:13px;}
  .stat.hp b{color:var(--red);}

  #content{flex:1;padding:32px 36px;display:flex;flex-direction:column;gap:20px;}

  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--teal);
    text-transform:uppercase;
  }
  h1{
    font-family:var(--serif);font-weight:600;font-size:26px;margin:0;color:var(--ink);
    line-height:1.3;
  }
  .narrative{
    font-family:var(--serif);font-size:16px;line-height:1.85;color:var(--parchment);
    white-space:pre-line;
    border-left:2px solid var(--line);padding-left:16px;
  }
  .narrative.flashback{border-left-color:var(--amber);}
  .devnote{
    font-family:var(--mono);font-size:11px;color:var(--amber);
    background:rgba(201,151,63,.08);border:1px solid rgba(201,151,63,.3);
    padding:8px 10px;border-radius:4px;
  }

  #choices{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  button.choice{
    font-family:var(--serif);font-size:15px;color:var(--ink);
    background:var(--panel-raised);border:1px solid var(--line);
    padding:12px 16px;border-radius:4px;text-align:left;cursor:pointer;
    transition:border-color .15s ease, transform .1s ease;
  }
  button.choice:hover{border-color:var(--teal);}
  button.choice:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  button.choice:active{transform:scale(0.99);}
  button.primary{
    font-family:var(--mono);font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--void);background:var(--teal);border:none;
    padding:12px 20px;border-radius:4px;cursor:pointer;align-self:flex-start;
  }
  button.primary:hover{filter:brightness(1.08);}
  button.primary:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

  #textInputRow{display:flex;gap:8px;margin-top:4px;}
  #textInputRow input{
    flex:1;font-family:var(--mono);font-size:14px;background:var(--panel-raised);
    border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:4px;
  }
  #textInputRow input:focus-visible{outline:2px solid var(--teal);}

  .hpbars{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
  .hpbar-label{font-family:var(--mono);font-size:11px;color:var(--ink-dim);display:flex;justify-content:space-between;}
  .hpbar-track{height:8px;background:var(--panel-raised);border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .hpbar-fill{height:100%;background:var(--red);transition:width .25s ease;}
  .hpbar-fill.player{background:var(--teal);}

  #log{
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);
    display:flex;flex-direction:column;gap:2px;max-height:110px;overflow-y:auto;
    border-top:1px dashed var(--line);padding-top:8px;
  }

  #flagbar{
    margin-top:auto;padding-top:16px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:10px;color:var(--ink-dim);
    display:flex;flex-wrap:wrap;gap:6px;
  }
  .flagchip{padding:3px 8px;border:1px solid var(--line);border-radius:12px;}
  .flagchip.on{color:var(--amber);border-color:var(--amber);}

  @media (max-width:640px){
    #shaft{width:40px;}
    .tick{width:22px;font-size:8px;}
    #content{padding:20px 18px;}
    h1{font-size:21px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

  </nav>
  <main id="main">
    <div id="statusbar"></div>
    <div id="content"></div>
  </main>
</div>

const shaftTicksEl = document.getElementById("shaft-ticks");
const statusbarEl = document.getElementById("statusbar");
const contentEl = document.getElementById("content");

function currentFloorKey(){ return gameData.floorOrder[state.floorIndex]; }

function renderShaft(){
  shaftTicksEl.innerHTML = "";
  gameData.floorOrder.forEach((key, i) => {
    const el = document.createElement("div");
    el.className = "tick" + (i < state.floorIndex ? " done" : "") + (i === state.floorIndex ? " current" : "");
    el.textContent = key;
    shaftTicksEl.appendChild(el);
  });
}

function renderStatusbar(){
  const s = state.stats;
  statusbarEl.innerHTML = `
    <div class="stat">STR <b>${s.STR}</b></div>
    <div class="stat">DEX <b>${s.DEX}</b></div>
    <div class="stat">INT <b>${s.INT}</b></div>
    <div class="stat">CHA <b>${s.CHA}</b></div>
    <div class="stat hp">HP <b>${s.HP}/${s.HPMax}</b></div>
  `;
}

  const bar = document.createElement("div");
  bar.id = "flagbar";
  Object.keys(state.flags).forEach(k=>{
    if (typeof state.flags[k] !== "boolean") return;
    const chip = document.createElement("span");
    chip.className = "flagchip" + (state.flags[k] ? " on" : "");
    chip.textContent = k;
    bar.appendChild(chip);
  });
  container.appendChild(bar);
}

function clearContent(){ contentEl.innerHTML = ""; }

function makeEl(tag, cls, text){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function addEyebrow(container, text){
  container.appendChild(makeEl("div","eyebrow",text));
}
function addTitle(container, text){
  container.appendChild(makeEl("h1", null, text));
}
function addNarrative(container, text, flashback){
  container.appendChild(makeEl("div", "narrative" + (flashback ? " flashback" : ""), text));
}
function addDevnote(container, text){
  container.appendChild(makeEl("div","devnote",text));
}
function addPrimaryButton(container, label, onClick){
  const b = makeEl("button","primary",label);
  b.addEventListener("click", onClick);
  container.appendChild(b);
  return b;
}

function goNext(){
  state.floorIndex++;
  if (state.floorIndex >= gameData.floorOrder.length){
    renderEndingChoice(); // 理論上不會走到這，B2 會導向 renderEndingChoice
    return;
  }
  render();
}

function applyEffect(effect){
  if (!effect) return;
  Object.keys(effect).forEach(k=>{
    if (k in state.stats) state.stats[k] += effect[k];
    else if (k in state.flags) state.flags[k] += effect[k];
  });
  if (state.stats.HP > state.stats.HPMax) state.stats.HP = state.stats.HPMax;
}

function render(){
  renderShaft();
  renderStatusbar();
  clearContent();
  const key = currentFloorKey();

  if (typeof key === "number"){
    renderFloor(key);
  } else if (key === "B1"){
    renderB1();
  } else if (key === "B2"){
    renderB2();
  }
}

/* ---------------------- 樓層渲染 ---------------------- */
function renderFloor(key){
  const node = gameData.floors[key];
  addEyebrow(contentEl, `第 ${key} 層`);
  addTitle(contentEl, node.title);

  switch(node.type){
    case "start": return renderStart(node);
    case "puzzle_text":
    case "puzzle_math": return renderPuzzle(node);
    case "puzzle_text_and_potion":
    case "puzzle_math_and_potion": return renderPuzzle(node, true);
    case "stat_boost": return renderStatBoost(node);
    case "stat_check": return renderStatCheck(node);
    case "monster":
    case "monster_and_potion": return renderMonster(node, node.type==="monster_and_potion");
    case "boss": return renderMonster(node, false, true);
    case "potion": return renderPotion(node);
    default:
      addNarrative(contentEl, node.narrative || "（此節點尚未實作）");
      addPrimaryButton(contentEl, "繼續", goNext);
  }
  renderFlagbar(contentEl);
}

function renderStart(node){
  addNarrative(contentEl, node.narrative);
  const step = node.startSteps[state.startStepIndex];
  if (!step){
    addPrimaryButton(contentEl, "推開門，往下層走", () => { state.startStepIndex = 0; goNext(); });
    return;
  }
  if (step.choices){
    const box = makeEl("div"); box.id = "choices";
    step.choices.forEach(c=>{
      const b = makeEl("button","choice",c.label);
      b.addEventListener("click", ()=>{
        applyEffect(c.effect);
        state.startStepIndex++;
        toast(c.result);
        render();
      });
      box.appendChild(b);
    });
    contentEl.appendChild(box);
  } else if (step.auto){
    applyEffect(step.auto.effect);
    toast(step.auto.result);
    state.startStepIndex++;
    render();
  }
}

let toastText = "";
function toast(text){ toastText = text; }
function renderToastIfAny(){
  if (toastText){
    const t = makeEl("div","narrative", toastText);
    contentEl.insertBefore(t, contentEl.children[2] || null);
    toastText = "";
  }
}

function renderPuzzle(node, isPotionNode){
  addNarrative(contentEl, node.narrative);
  if (node.devnote) addDevnote(contentEl, node.devnote);

  const finish = (correct) => {
    if (node.setFlagsOnSolve) Object.assign(state.flags, node.setFlagsOnSolve);
    if (node.resultNote) addNarrative(contentEl, node.resultNote, node.flashback);
    if (isPotionNode) applyPotion();
    addPrimaryButton(contentEl, correct ? "繼續" : "先繼續（可日後修正）", goNext);
  };

  if (node.options){
    const box = makeEl("div"); box.id="choices";
    node.options.forEach(opt=>{
      const b = makeEl("button","choice",opt.label);
      b.addEventListener("click", ()=>{
        clearContent();
        addEyebrow(contentEl, `第 ${currentFloorKey()} 層`);
        addTitle(contentEl, node.title);
        addNarrative(contentEl, node.narrative);
        if (node.devnote) addDevnote(contentEl, node.devnote);
        const correct = node.answer === "__TODO__" ? true : opt.value === node.answer;
        addNarrative(contentEl, correct ? "✓ 答對了。" : `✗ 不太對，正確答案應為「${labelFor(node,node.answer)}」。`);
        finish(correct);
        renderFlagbar(contentEl);
      });
      box.appendChild(b);
    });
    contentEl.appendChild(box);
  } else {
    const row = makeEl("div"); row.id="textInputRow";
    const input = document.createElement("input");
    input.placeholder = "輸入答案…";
    input.setAttribute("aria-label","輸入答案");
    const btn = makeEl("button","primary","送出");
    btn.addEventListener("click", ()=>{
      const val = input.value.trim().toLowerCase();
      const target = computeDynamicAnswer(node) ?? node.inputAnswer;
      const correct = val === String(target).toLowerCase();
      clearContent();
      addEyebrow(contentEl, `第 ${currentFloorKey()} 層`);
      addTitle(contentEl, node.title);
      addNarrative(contentEl, node.narrative);
      if (node.devnote) addDevnote(contentEl, node.devnote);
      addNarrative(contentEl, correct ? "✓ 答對了。" : `✗ 不太對，正確答案應為「${target}」。`);
      finish(correct);
      renderFlagbar(contentEl);
    });
    row.appendChild(input); row.appendChild(btn);
    contentEl.appendChild(row);
  }
  renderFlagbar(contentEl);
}

function computeDynamicAnswer(node){
  if (!node.dynamicAnswer) return null;
  const { base, countFlags } = node.dynamicAnswer;
  const count = countFlags.filter(f=>state.flags[f]).length;
  return base + count;
}

function labelFor(node, value){
  if (!node.options) return value;
  const found = node.options.find(o=>o.value===value);
  return found ? found.label : value;
}

function renderStatBoost(node){
  applyEffect(node.effect);
  const [statName] = Object.keys(node.effect);
  addNarrative(contentEl, node.narrative || `一座小型祭壇／培養艙，觸碰後你感到一陣輕微的記憶閃回。（${statName} +${node.effect[statName]}）`);
  addPrimaryButton(contentEl, "繼續", goNext);
  renderFlagbar(contentEl);
}

function renderStatCheck(node){
  addNarrative(contentEl, node.narrative);
  const pass = state.stats[node.checkStat] >= node.threshold;
  const outcome = pass ? node.onSuccess : node.onFailure;
  addNarrative(contentEl, outcome.result, pass);
  if (pass && outcome.setFlags) Object.assign(state.flags, outcome.setFlags);
  addPrimaryButton(contentEl, "繼續", goNext);
  renderFlagbar(contentEl);
}

function renderPotion(node){
  addNarrative(contentEl, "地上散落著幾瓶藥水。");
  addPrimaryButton(contentEl, "撿起並飲用", ()=>{
    const healed = applyPotion();
    clearContent();
    addEyebrow(contentEl, `第 ${currentFloorKey()} 層`);
    addTitle(contentEl, node.title);
    addNarrative(contentEl, `你飲下藥水，回復了 ${healed} 點血量。`);
    addPrimaryButton(contentEl, "繼續", goNext);
    renderFlagbar(contentEl);
  });
  renderFlagbar(contentEl);
}

function applyPotion(){
  const isLarge = Math.random() < 0.5;
  const heal = isLarge ? rand(6,9) : rand(3,5);
  state.stats.HP = Math.min(state.stats.HPMax, state.stats.HP + heal);
  return heal;
}

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

/* ---------------------- 戰鬥 ---------------------- */
function renderMonster(node, alsoGivesPotion, isBoss){
  const mon = gameData.monsters[node.monsterId];
  if (!state.combat || state.combat.monsterId !== node.monsterId){
    state.combat = { monsterId: node.monsterId, hp: mon.hp, log: [] };
  }
  if (node.narrative) addNarrative(contentEl, node.narrative);
  if (node.requiresFlag && !state.flags[node.requiresFlag]){
    addNarrative(contentEl, "（此密室尚未解鎖，理論上不應出現在此流程中）");
  }

  const combat = state.combat;
  const wrap = makeEl("div","hpbars");
  wrap.innerHTML = `
    <div>
      <div class="hpbar-label"><span>${mon.name}</span><span>${Math.max(combat.hp,0)}/${mon.hp}</span></div>
      <div class="hpbar-track"><div class="hpbar-fill" style="width:${Math.max(combat.hp,0)/mon.hp*100}%"></div></div>
    </div>
    <div>
      <div class="hpbar-label"><span>你</span><span>${Math.max(state.stats.HP,0)}/${state.stats.HPMax}</span></div>
      <div class="hpbar-track"><div class="hpbar-fill player" style="width:${Math.max(state.stats.HP,0)/state.stats.HPMax*100}%"></div></div>
    </div>
  `;
  contentEl.appendChild(wrap);

  if (combat.hp > 0 && state.stats.HP > 0){
    addPrimaryButton(contentEl, "攻擊", ()=>{
      const dmgToMonster = rand(state.stats.STR, state.stats.STR + 10);
      combat.hp -= dmgToMonster;
      combat.log.unshift(`你造成 ${dmgToMonster} 點傷害。`);
      if (combat.hp > 0){
        const [lo,hi] = mon.atkRange;
        const dmgToPlayer = rand(lo,hi);
        state.stats.HP -= dmgToPlayer;
        combat.log.unshift(`${mon.name} 反擊，你受到 ${dmgToPlayer} 點傷害。`);
      }
      if (state.stats.HP <= 0 && isBoss){
        state.flags.hpZeroAtBoss = true;
        renderEnding("endingHidden_weapon");
        return;
      } else if (state.stats.HP <= 0){
        state.stats.HP = 1; // 一般戰鬥不做真正死亡結局，避免卡關
        combat.log.unshift("你撐住了最後一口氣。");
      }
      render();
      renderCombatLog(combat.log);
    });
  } else if (combat.hp <= 0){
    addNarrative(contentEl, `擊敗了 ${mon.name}。`);
    if (alsoGivesPotion){
      addPrimaryButton(contentEl, "撿取藥水並繼續", ()=>{ applyPotion(); state.combat=null; goNext(); });
    } else {
      addPrimaryButton(contentEl, "繼續", ()=>{ state.combat=null; goNext(); });
    }
  }
  renderCombatLog(combat.log);
  renderFlagbar(contentEl);
}

function renderCombatLog(log){
  const old = document.getElementById("log");
  if (old) old.remove();
  const box = makeEl("div"); box.id="log";
  log.slice(0,6).forEach(line=>box.appendChild(makeEl("div",null,line)));
  contentEl.appendChild(box);
}

/* ---------------------- 地下層 ---------------------- */
function renderB1(){
  const node = gameData.underground.B1;
  addEyebrow(contentEl,"地下一層");
  addTitle(contentEl, node.title);
  const count = node.requiresFlags.filter(f=>state.flags[f]).length;
  const full = count >= node.minCount;
  addNarrative(contentEl, full ? node.fullText : node.partialText, full);
  addNarrative(contentEl, `（已收集線索旗標：${count} / ${node.requiresFlags.length}，需滿足 ${node.minCount} 個才能觸發完整檔案）`);
  state.flags.b1FullArchiveTriggered = full;
  addPrimaryButton(contentEl, "前往地下二層", goNext);
  renderFlagbar(contentEl);
}

function renderB2(){
  const node = gameData.underground.B2;
  addEyebrow(contentEl,"地下二層");
  addTitle(contentEl, node.title);
  addNarrative(contentEl, node.narrative);

  const trueEndingAvailable = state.flags.b1FullArchiveTriggered;
  const choices = [
    { key:"ending1_destroyTower", label:"引爆核心，摧毀高塔",
      enabled: state.stats.strChoicesCount === undefined ? true : true, note:`(建議門檻 STR偏向選擇 ≥ ${CONFIG.destroyTowerStrThreshold} 次，此原型不強制限制)` },
    { key:"ending2_cloneResearch", label:"潛入研究室帶走複製人資料",
      enabled: state.flags.suspectsMirror, note: state.flags.suspectsMirror ? "" : "（需先在 floor11 解開鏡子謎題）" },
    { key:"ending3_villageScholar", label:"直接離開高塔前往最近村莊", enabled:true, note:"（無門檻）" },
    { key:"ending4_merchant", label:"循著補給路線去找商隊", enabled:true, note:"（建議門檻 CHA 相關，此原型不強制限制）" },
  ];
  if (trueEndingAvailable){
    choices.push({ key:"endingTrue_revealed", label:"（隱藏選項）追問到底 —— 真結局", enabled:true, note:"" });
  }

  const box = makeEl("div"); box.id="choices";
  choices.forEach(c=>{
    const b = makeEl("button","choice", c.label + (c.note?`  ${c.note}`:""));
    b.disabled = !c.enabled;
    if (!c.enabled) b.style.opacity = 0.4;
    b.addEventListener("click", ()=>renderEnding(c.key));
    box.appendChild(b);
  });
  contentEl.appendChild(box);
  renderFlagbar(contentEl);
}

function renderEnding(key){
  clearContent();
  const ending = gameData.endings[key];
  addEyebrow(contentEl,"結局");
  addTitle(contentEl, ending.title);
  addNarrative(contentEl, ending.text, true);
  addPrimaryButton(contentEl, "重新開始", restart);
  renderFlagbar(contentEl);
  const ticks = shaftTicksEl.querySelectorAll(".tick");
  ticks.forEach(t=>t.classList.add("done"));
}

function restart(){
  state = {
    stats: {...gameData.meta.startingStats},
    flags: {
      solvedDiary25:false, unlockedFloor24:false, remembersAbel:false,
      knowsSurvivorCount:false, suspectsMirror:false, sawCarvedNames:false,
      recalledNumber:false, hpZeroAtBoss:false, strChoicesCount:0, chaChoicesCount:0,
    },
    floorIndex: 0, startStepIndex: 0, combat: null,
  };
  render();
}

render();
</script>
</body>
</html>
