<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高塔迴聲</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', 'Songti SC', serif;
      padding: 16px;
    }

    /* ══════════════════════════════════════
       開頭畫面
    ══════════════════════════════════════ */
    #title-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #1a1a22 0%, #060608 70%);
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #title-screen.hidden { opacity: 0; pointer-events: none; }
    #title-screen::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  55%, rgba(255,255,255,0.5) 0%, transparent 100%);
    }
    #title-emblem { font-size: 72px; margin-bottom: 24px; filter: drop-shadow(0 0 40px rgba(150,180,180,0.5)); animation: float 3s ease-in-out infinite; z-index:1; }
    #title-main { font-size: clamp(28px,6vw,48px); font-weight:700; color:#fff; letter-spacing:8px; text-align:center; text-shadow: 0 0 20px rgba(150,180,180,0.8), 0 0 60px rgba(90,120,120,0.4); z-index:1; margin-bottom:10px; animation: fadeUp 1s ease both; }
    #title-sub { font-size:13px; color:rgba(180,200,200,0.5); letter-spacing:4px; z-index:1; margin-bottom:56px; animation: fadeUp 1s 0.2s ease both; }
    #start-btn {
      z-index:1; background:transparent; border:1px solid rgba(180,200,200,0.4);
      color:rgba(200,220,220,0.9); font-family:inherit; font-size:15px; letter-spacing:5px;
      padding:14px 48px; border-radius:40px; cursor:pointer;
      transition: all 0.3s ease; animation: fadeUp 1s 0.4s ease both;
    }
    #start-btn:hover { border-color:rgba(180,200,200,0.8); color:#fff; box-shadow:0 0 24px rgba(120,150,150,0.3); transform:translateY(-2px); }
    #title-footer { position:absolute; bottom:24px; color:rgba(255,255,255,0.15); font-size:11px; letter-spacing:2px; z-index:1; }

    /* ══════════════════════════════════════
       主遊戲框
    ══════════════════════════════════════ */
    #app { width:100%; max-width:760px; border-radius:16px; overflow:hidden; box-shadow:0 0 80px rgba(0,0,0,0.9); border:1px solid rgba(255,255,255,0.08); }

    /* 場景 */
    #scene { height:280px; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; transition:background 0.8s ease; }
    #scene-overlay { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 80%, rgba(255,255,255,0.04) 0%, transparent 70%); pointer-events:none; }
    #bg-char { font-size:90px; filter:drop-shadow(0 0 30px rgba(255,255,255,0.2)); z-index:1; transition:opacity 0.4s ease; display:flex; align-items:center; justify-content:center; }
    #bg-char img { object-fit:contain; filter:drop-shadow(0 0 20px rgba(255,255,255,0.15)); transition:opacity 0.4s ease; }
    #scene-label { position:absolute; top:12px; left:16px; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); padding:4px 12px; border-radius:20px; color:rgba(255,255,255,0.6); font-size:12px; letter-spacing:1px; border:1px solid rgba(255,255,255,0.1); z-index:2; }
    #click-hint { position:absolute; bottom:14px; right:18px; color:rgba(255,255,255,0.4); font-size:12px; animation:blink 1.2s infinite; z-index:2; }

    /* 對話框 */
    #dialog { background:rgba(8,8,16,0.97); padding:20px 24px 24px; transition:opacity 0.3s ease; position:relative; }
    #char-name { font-size:14px; font-weight:700; letter-spacing:3px; margin-bottom:10px; }
    #dialog-text { color:rgba(220,220,235,0.92); font-size:16px; line-height:1.9; min-height:56px; letter-spacing:0.5px; cursor:pointer; white-space:pre-line; }
    #cursor { opacity:0.5; animation:blink 0.7s infinite; display:none; }
    #choices { margin-top:20px; display:flex; flex-direction:column; gap:10px; }
    .choice-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:rgba(200,200,220,0.9); padding:12px 18px; text-align:left; font-size:15px; cursor:pointer; transition:all 0.2s; font-family:inherit; letter-spacing:0.4px; line-height:1.5; }
    .choice-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.35); transform:translateX(4px); }
    .choice-index { color:rgba(255,255,255,0.3); margin-right:10px; font-size:12px; }

    /* 文字輸入框 */
    .text-input-wrap { display:flex; gap:10px; align-items:stretch; }
    .text-input-field {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      color: rgba(220,220,235,0.92);
      font-family: inherit;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      letter-spacing: 0.4px;
      transition: border-color 0.2s, background 0.2s;
    }
    .text-input-field::placeholder { color: rgba(255,255,255,0.2); }
    .text-input-field:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.07); }
    .text-input-send {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      color: rgba(200,200,220,0.9);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 20px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .text-input-send:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }
    .text-input-hint { font-size:12px; color:rgba(255,255,255,0.2); margin-top:6px; letter-spacing:0.5px; }

    /* 結局 */
    #ending { margin-top:20px; text-align:center; padding:16px 0 4px; border-top:1px solid rgba(255,255,255,0.08); display:none; }
    #ending-label { color:rgba(255,255,255,0.4); font-size:13px; letter-spacing:2px; margin-bottom:14px; }
    #restart-btn { background:transparent; border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.7); padding:10px 28px; border-radius:6px; cursor:pointer; font-size:14px; letter-spacing:2px; font-family:inherit; transition:all 0.2s; }
    #restart-btn:hover { background:rgba(255,255,255,0.08); }

    /* ══════════════════════════════════════
       戰鬥畫面
    ══════════════════════════════════════ */
    #battle-screen {
      display: none;
      flex-direction: column;
      background: rgba(8,8,16,0.97);
    }

    #battle-stage {
      height: 280px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      overflow: hidden;
      transition: background 0.6s ease;
    }

    .combatant { display:flex; flex-direction:column; align-items:center; gap:10px; z-index:2; }
    .combatant-sprite { font-size:72px; transition:transform 0.15s ease; display:block; }
    .combatant-sprite.shake        { animation: shake       0.4s ease; }
    .combatant-sprite.attack-right { animation: attackRight 0.4s ease; }
    .combatant-sprite.attack-left  { animation: attackLeft  0.4s ease; }
    .combatant-name { font-size:13px; letter-spacing:2px; color:rgba(255,255,255,0.7); }

    .hp-bar-wrap { width:120px; background:rgba(255,255,255,0.08); border-radius:99px; height:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
    .hp-bar { height:100%; border-radius:99px; transition:width 0.4s ease, background 0.4s ease; }
    .hp-bar.green  { background: linear-gradient(90deg, #3ecf6a, #6dffaa); }
    .hp-bar.yellow { background: linear-gradient(90deg, #cfb03e, #ffe56d); }
    .hp-bar.red    { background: linear-gradient(90deg, #cf3e3e, #ff6d6d); }
    .hp-text { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:1px; }

    #battle-vs { font-size:28px; font-weight:700; color:rgba(255,255,255,0.12); letter-spacing:4px; z-index:1; }

    #battle-log-area {
      background: rgba(0,0,0,0.4);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 12px 20px;
      min-height: 50px;
      font-size: 14px;
      color: rgba(200,200,220,0.85);
      line-height: 1.7;
      letter-spacing: 0.3px;
    }

    #battle-actions { padding:16px 20px 20px; display:flex; flex-direction:column; gap:10px; }

    #item-bar { display:flex; gap:8px; margin-bottom:4px; }
    .item-btn {
      background:rgba(255,200,80,0.08); border:1px solid rgba(255,200,80,0.25);
      border-radius:8px; color:rgba(255,220,120,0.9); padding:7px 14px;
      font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s;
      display:flex; align-items:center; gap:6px;
    }
    .item-btn:hover:not(:disabled) { background:rgba(255,200,80,0.18); border-color:rgba(255,200,80,0.5); }
    .item-btn:disabled { opacity:0.3; cursor:default; }
    .item-count { font-size:11px; opacity:0.6; }

    #action-btns { display:flex; gap:10px; flex-wrap:wrap; }
    .action-btn {
      flex:1; min-width:100px; padding:12px 10px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.04);
      color:rgba(200,200,220,0.9); font-size:14px; font-family:inherit;
      letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    }
    .action-btn:hover:not(:disabled) { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.35); transform:translateY(-2px); }
    .action-btn:disabled { opacity:0.3; cursor:default; transform:none; }
    .action-btn.attack { border-color:rgba(255,100,100,0.4); color:rgba(255,160,160,0.9); }
    .action-btn.attack:hover:not(:disabled) { background:rgba(255,100,100,0.12); border-color:rgba(255,100,100,0.7); }
    .action-btn.flee { border-color:rgba(150,150,255,0.4); color:rgba(180,180,255,0.9); }
    .action-btn.flee:hover:not(:disabled) { background:rgba(150,150,255,0.12); border-color:rgba(150,150,255,0.7); }

    .dmg-popup {
      position:absolute; font-size:22px; font-weight:700;
      pointer-events:none; animation:popUp 0.9s ease forwards; z-index:10;
    }
    .dmg-popup.enemy  { color:#ff7070; text-shadow:0 0 10px rgba(255,80,80,0.7); }
    .dmg-popup.player { color:#ffd060; text-shadow:0 0 10px rgba(255,200,60,0.7); }
    .dmg-popup.heal   { color:#60ff90; text-shadow:0 0 10px rgba(60,255,100,0.7); }

    /* ══════════════════════════════════════
       Animations
    ══════════════════════════════════════ */
    @keyframes blink       { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes float       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fadeUp      { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shake       { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes attackRight { 0%,100%{transform:translateX(0)} 40%{transform:translateX(30px)} }
    @keyframes attackLeft  { 0%,100%{transform:translateX(0)} 40%{transform:translateX(-30px)} }
    @keyframes popUp       { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-50px)} }

    /* 數值變化提示 */
    .stat-toast {
      position: absolute;
      top: -10px;
      right: 20px;
      background: rgba(10,10,20,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(220,220,255,0.9);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 10;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .stat-toast.show { opacity: 1; transform: translateY(0); }

    /* 樓層旗標小面板（★新增，僅供你開發測試用，正式上線可整段刪除） */
    #debug-flags {
      position: fixed; top: 8px; left: 8px; z-index: 200;
      background: rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.15);
      border-radius:6px; padding:6px 10px; font-size:10px; color:rgba(255,255,255,0.5);
      max-width:220px; line-height:1.6; letter-spacing:0.5px; display:none;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
  🎮 【可修改區域 0】開頭畫面
══════════════════════════════════════ -->
<div id="title-screen">
  <div id="title-emblem">🗼</div>
  <div id="title-main">高塔迴聲</div>
  <div id="title-sub">ECHOES OF THE TOWER</div>
  <button id="start-btn" onclick="startGame()">▶ &nbsp; 開 始 遊 戲</button>
  <div id="title-footer">© 2026 Your Name</div>
</div>

<div id="debug-flags"></div>

<div id="app">
  <!-- 劇情畫面 -->
  <div id="story-screen">
    <div id="scene">
      <div id="scene-overlay"></div>
      <div id="bg-char"></div>
      <div id="scene-label"></div>
      <div id="click-hint" style="display:none">▶ 點擊繼續</div>
    </div>
    <div id="dialog">
      <div id="char-name"></div>
      <div id="dialog-text"><span id="text-content"></span><span id="cursor">▌</span></div>
      <div id="choices"></div>
      <div id="ending">
        <div id="ending-label">── END ──</div>
        <button id="restart-btn" onclick="restart()">↩ 重新開始</button>
      </div>
    </div>
  </div>

  <!-- ⚔️ 戰鬥畫面 -->
  <div id="battle-screen">
    <div id="battle-stage">
      <div class="combatant" id="player-side">
        <div class="combatant-sprite" id="player-sprite">🧍</div>
        <div class="combatant-name"  id="player-name">實驗體07</div>
        <div class="hp-bar-wrap"><div class="hp-bar green" id="player-hp-bar" style="width:100%"></div></div>
        <div class="hp-text" id="player-hp-text">100 / 100</div>
      </div>
      <div id="battle-vs">VS</div>
      <div class="combatant" id="enemy-side">
        <div class="combatant-sprite" id="enemy-sprite">👹</div>
        <div class="combatant-name"  id="enemy-name">敵人</div>
        <div class="hp-bar-wrap"><div class="hp-bar green" id="enemy-hp-bar" style="width:100%"></div></div>
        <div class="hp-text" id="enemy-hp-text">80 / 80</div>
      </div>
    </div>

    <div id="battle-log-area">⚔️ 戰鬥開始！</div>

    <div id="battle-actions">
      <div id="item-bar">
        <button class="item-btn" id="potion-btn" onclick="useItem('potion')">
          🧪 回復藥水 <span class="item-count" id="potion-count">×2</span>
        </button>
      </div>
      <div id="action-btns">
        <button class="action-btn attack" onclick="playerAction('attack')">⚔️ 攻擊</button>
        <button class="action-btn attack" onclick="playerAction('heavy')">💥 重擊</button>
        <button class="action-btn flee"   onclick="playerAction('flee')">💨 逃跑</button>
      </div>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  🎮 【可修改區域 1】角色設定                                 ║
// ╚══════════════════════════════════════════════════════════════╝
const CHARACTERS = {
  narrator: { name: "旁白",   color: "#9aa5ad" },
  echo:     { name: "？？？", color: "#c9973f" }, // 用於守望者/異常記憶片段的台詞
};

// ╔══════════════════════════════════════════════════════════════╗
// ║  🎮 【可修改區域 2】場景設定                                 ║
// ║  依樓層區段分成四種場景基調，可自行改成每層獨立場景            ║
// ╚══════════════════════════════════════════════════════════════╝
const SCENES = {
  tower_top: {
    bg: "linear-gradient(180deg, #0d0f12 0%, #1b2028 45%, #0d0f12 100%)",
    label: "🗼 高塔上層",
  },
  tower_mid: {
    bg: "linear-gradient(180deg, #0d1012 0%, #182228 45%, #0d1012 100%)",
    label: "🗼 高塔中層",
  },
  tower_lower: {
    bg: "linear-gradient(180deg, #0c0e10 0%, #14181d 45%, #0c0e10 100%)",
    label: "🗼 高塔下層",
  },
  boss_hall: {
    bg: "linear-gradient(180deg, #0a0a0a 0%, #241010 45%, #0a0a0a 100%)",
    label: "⚔ 塔底決戰",
  },
  archive: {
    bg: "linear-gradient(180deg, #0a0c0e 0%, #1a1712 45%, #0a0c0e 100%)",
    label: "📁 地下一層・檔案室",
  },
  core: {
    bg: "linear-gradient(180deg, #06080a 0%, #10181a 45%, #06080a 100%)",
    label: "🖥 地下二層・核心控制室",
  },
};

// ╔══════════════════════════════════════════════════════════════╗
// ║  🎮 【可修改區域 3】主角戰鬥數值                             ║
// ║  hp        : 最大血量                                        ║
// ║  atk       : 普通攻擊傷害 [最小, 最大]                       ║
// ║  heavy     : 重擊傷害 [最小, 最大]（25% 機率失手）            ║
// ║  potionHeal: 戰鬥中使用道具藥水的回復量                       ║
// ║  items     : 初始道具數量                                    ║
// ╚══════════════════════════════════════════════════════════════╝
const PLAYER_BASE = {
  name:       "實驗體07",
  sprite:     "🧍",
  hp:         200,
  atk:        [8, 14],
  heavy:      [16, 26],
  potionHeal: 6,
  items:      { potion: 2 },
};

// ╔══════════════════════════════════════════════════════════════╗
// ║  🎮 【可修改區域 3-1】★新增：主角四維屬性（原模板沒有）       ║
// ║  STR/DEX/INT/CHA，對應劇本設定，初始各 5 點                  ║
// ║  目前僅 STR（連動 atk）與 INT（floor7 判定）有掛勾遊戲機制，   ║
// ║  DEX / CHA 尚未接上任何機制，請依你的設計自行擴充：            ║
// ║  TODO：DEX 是否影響閃避／逃跑成功率？CHA 是否影響結局門檻？    ║
// ╚══════════════════════════════════════════════════════════════╝
const STATS = { STR: 5, DEX: 5, INT: 5, CHA: 5 };

// ╔══════════════════════════════════════════════════════════════╗
// ║  🎮 【可修改區域 3-2】★新增：旗標系統（原模板沒有）           ║
// ║  用來記錄玩家是否解開特定線索，影響地下一層檔案完整度、        ║
// ║  地下二層可選結局、以及 floor2 的動態答案                     ║
// ╚══════════════════════════════════════════════════════════════╝
const FLAGS = {
  solvedDiary25: false,
  unlockedFloor24: false,
  remembersAbel: false,
  knowsSurvivorCount: false,
  suspectsMirror: false,
  exploredMirrorDeep: false,
  sawCarvedNames: false,
  recalledNumber: false,
  hpZeroAtBoss: false,
  b1FullArchiveTriggered: false,
};

// ╔══════════════════════════════════════════════════════════════╗
// ║  🎮 【可修改區域 4】敵人資料表                               ║
// ║  在 STORY 節點中用 battle:"id" 觸發對應敵人                  ║

// ── 音效引擎（不需要修改）────────────────────────
const AUDIO = { bgm: null, bgmFile: null };

function playBGM(file) {
  if (!file || AUDIO.bgmFile === file) return;
  if (AUDIO.bgm) { AUDIO.bgm.pause(); AUDIO.bgm = null; }
  AUDIO.bgmFile = file;
  AUDIO.bgm = new Audio(file);
  AUDIO.bgm.loop   = true;
  AUDIO.bgm.volume = AUDIO_FILES.volume.bgm;
  AUDIO.bgm.play().catch(() => {});
}
function stopBGM() {
  if (AUDIO.bgm) { AUDIO.bgm.pause(); AUDIO.bgm = null; }
  AUDIO.bgmFile = null;
}
function playSFX(file) {
  if (!file) return;
  const s = new Audio(file);
  s.volume = AUDIO_FILES.volume.sfx;
  s.play().catch(() => {});
}

  PLAYER_BASE.items.potion = 2;

function showStory()  { elStoryScreen.style.display = "block"; elBattleScreen.style.display = "none"; }
function showBattle() { elStoryScreen.style.display = "none";  elBattleScreen.style.display = "flex"; }

// ── 劇情渲染 ────────────────────────────────────
function render(nodeId, animate = true) {
  currentNode = nodeId;
  const node  = STORY[nodeId];
  const scene = SCENES[node.scene];
  const char  = CHARACTERS[node.character];

  if (animate) { elDialog.style.opacity = "0"; elBgChar.style.opacity = "0"; }

  setTimeout(() => {
    const sceneBgm = AUDIO_FILES.bgm[node.scene] || null;
    playBGM(sceneBgm);
    if (node.sfx) playSFX(node.sfx);

    elScene.style.background   = scene.bg;
    elScene.style.backgroundSize   = "cover";
    elScene.style.backgroundPosition = "center";
    elLabel.textContent        = scene.label;

    if (node.bg_char && /\.(jpg|jpeg|png|gif|webp)$/i.test(node.bg_char)) {
      const w = node.bg_char_width  || "auto";
      const h = node.bg_char_height || "220px";
      elBgChar.innerHTML = `<img src="${node.bg_char}" style="width:${w};height:${h};">`;
    } else {
      elBgChar.innerHTML = "";
      elBgChar.textContent = node.bg_char || "";
    }
    elCharName.textContent    = "◆ " + char.name;
    elCharName.style.color    = char.color;
    elCharName.style.textShadow = `0 0 12px ${char.color}80`;
    elChoices.innerHTML       = "";
    elEnding.style.display    = "none";
    elClickHint.style.display = "none";
    elScene._battlePending    = null;
    elDialog.style.opacity    = "1";
    elBgChar.style.opacity    = "0.85";

    // ★新增：地下一層檔案室，依旗標數量決定顯示哪個版本的文字
    let displayText = node.text;
    if (node.archiveRoom) {
      const count = node.requiresFlags.filter(f => FLAGS[f]).length;
      const full = count >= node.minCount;
      FLAGS.b1FullArchiveTriggered = full;
      displayText = full ? node.fullText : node.partialText;
    }

    typeText(displayText, () => {
      // ── 套用數值變化 ──────────────────────────
      if (node.statChange) applyStatChange(node.statChange);
      // ★新增：套用旗標
      if (node.setFlags) Object.assign(FLAGS, node.setFlags);
      // ★新增：依 STATS 數值自動分支（例如 floor7 的 INT 判定）
      if (node.statCheck) {
        const { stat, threshold, passNext, failNext } = node.statCheck;
        node.next = STATS[stat] >= threshold ? passNext : failNext;
      }
      updateDebugFlags();

      if (node.battle) {
        elClickHint.textContent   = "▶ 點擊進入戰鬥";
        elClickHint.style.display = "block";
        elScene._battlePending    = node.battle;
      } else if (node.ending) {
        showEndingScreen(node.ending);
      } else if (node.dynamicEndings) {
        // ★新增：地下二層依旗標動態顯示可選結局
        showDynamicEndings(node);
      } else if (node.choices) {
        showChoices(node.choices);
      } else if (node.next === null) {
        showEndingScreen();
      } else if (node.next !== undefined) {
        elClickHint.textContent   = "▶ 點擊繼續";
        elClickHint.style.display = "block";
      }
    });
  }, animate ? 300 : 0);
}

function typeText(text, onDone) {
  clearInterval(typeTimer);
  elText.textContent     = "";
  elCursor.style.display = "inline";
  isTyping = true;
  let i = 0;
  typeTimer = setInterval(() => {
    i++;
    elText.textContent = text.slice(0, i);
    if (i >= text.length) {
      clearInterval(typeTimer);
      elCursor.style.display = "none";
      isTyping = false;
      if (onDone) onDone();
    }
  }, 25);
  elText._fullText = text;
  elText._onDone   = onDone;
}

function skipType() {
  if (!isTyping) return;
  clearInterval(typeTimer);
  elText.textContent     = elText._fullText;
  elCursor.style.display = "none";
  isTyping = false;
  if (elText._onDone) elText._onDone();
}

function showChoices(choices) {
  elChoices.innerHTML = "";

  // ── 文字輸入模式 ──────────────────────────────
  // 節點格式: choices: [{ type:"input", placeholder:"...", next:id, keywords:[...] }]
  // ★新增：也支援 dynamic:{base, countFlags} + correctNext/wrongNext（動態答案，見 floor2）
  if (choices.length === 1 && choices[0].type === "input") {
    const cfg = choices[0];
    const wrap = document.createElement("div");
    wrap.className = "text-input-wrap";

    const input = document.createElement("input");
    input.type        = "text";
    input.className   = "text-input-field";
    input.placeholder = cfg.placeholder || "輸入你的回應……";
    input.maxLength   = 60;

    const btn = document.createElement("button");
    btn.className   = "text-input-send";
    btn.textContent = "確認 ▶";

    const hint = document.createElement("div");
    hint.className   = "text-input-hint";
    hint.textContent = cfg.hint || "";

    const submit = () => {
      const val = input.value.trim();
      if (!val) return;
      let nextId;
      if (cfg.dynamic) {
        // ★新增：動態答案比對
        const count  = cfg.dynamic.countFlags.filter(f => FLAGS[f]).length;
        const answer = String(cfg.dynamic.base + count);
        nextId = (val === answer) ? cfg.correctNext : cfg.wrongNext;
      } else {
        nextId = cfg.next; // 預設節點（通常是答錯的分支）
        if (cfg.keywords) {
          for (const kw of cfg.keywords) {
            if (kw.words.some(w => val.toLowerCase() === w.toLowerCase() || val.includes(w))) {
              nextId = kw.next;
              break;
            }
          }
        }
      }
      render(nextId, true);
    };

    btn.onclick = submit;
    input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });

    wrap.appendChild(input);
    wrap.appendChild(btn);
    elChoices.appendChild(wrap);
    if (hint.textContent) elChoices.appendChild(hint);
    setTimeout(() => input.focus(), 50);
    return;
  }

  // ── 一般選項按鈕 ──────────────────────────────
  choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="choice-index">${ROMAN[i]}</span>${c.text}`;
    btn.onclick = () => { playSFX(AUDIO_FILES.sfx.click); render(c.next, true); };
    elChoices.appendChild(btn);
  });
}

// ★新增：地下二層核心控制室的結局選單，依旗標篩選可選結局
function showDynamicEndings(node) {
  elChoices.innerHTML = "";
  node.endingOptions.forEach(opt => {
    const ok = opt.requirement === "always" ||
      (opt.requirement.startsWith("flag:") && FLAGS[opt.requirement.slice(5)]);
    if (!ok) return; // 未達成條件則不顯示；若想改成「顯示但鎖定」，可在此自行調整
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = opt.label;
    btn.onclick = () => { playSFX(AUDIO_FILES.sfx.click); render(opt.next, true); };
    elChoices.appendChild(btn);
  });
}

function showEndingScreen(label) {
  isEnded = true;
  elEndingLabel.textContent = label ? `── ${label} ──` : "── END ──";

// ── 數值變化 ─────────────────────────────────────
// 在 STORY 節點加入 statChange: { hp, damage, heal, atk, heavy, potion, str, dex, int, cha }
//   hp     : 改變最大血量上限（正數增加，負數減少）
//   damage : 扣除當前血量
//   heal   : 回復當前血量，可填數字或 [最小,最大] 隨機範圍（★擴充，原模板只支援固定數字）
//   atk    : 改變攻擊力
//   heavy  : 改變重擊力
//   potion : 改變藥水數量
//   str/dex/int/cha : ★新增，改變 STATS 四維屬性
function applyStatChange(s) {
  const msgs = [];

  if (s.hp) {
    PLAYER_BASE.hp = Math.max(1, PLAYER_BASE.hp + s.hp);
    if (persistentHp !== null) {
      persistentHp = s.hp > 0 ? persistentHp + s.hp : Math.min(persistentHp, PLAYER_BASE.hp);
    }
    msgs.push(`${s.hp > 0 ? "❤️ 最大HP +" : "💔 最大HP "}${s.hp}`);
  }

  if (s.damage) {
    const dmg = Math.abs(s.damage);
    if (persistentHp === null) persistentHp = PLAYER_BASE.hp;
    persistentHp = Math.max(1, persistentHp - dmg);
    msgs.push(`💔 受到傷害 -${dmg}`);
  }

  if (s.heal) {
    const amount = Array.isArray(s.heal) ? rand(s.heal[0], s.heal[1]) : Math.abs(s.heal);
    if (persistentHp === null) persistentHp = PLAYER_BASE.hp;
    persistentHp = Math.min(PLAYER_BASE.hp, persistentHp + amount);
    msgs.push(`💚 回復血量 +${amount}`);
  }

  if (s.atk) {
    PLAYER_BASE.atk[0] = Math.max(1, PLAYER_BASE.atk[0] + s.atk);
    PLAYER_BASE.atk[1] = Math.max(1, PLAYER_BASE.atk[1] + s.atk);
    msgs.push(`${s.atk > 0 ? "⚔️ 攻擊力 +" : "⚔️ 攻擊力 "}${s.atk}`);
  }
  if (s.heavy) {
    PLAYER_BASE.heavy[0] = Math.max(1, PLAYER_BASE.heavy[0] + s.heavy);
    PLAYER_BASE.heavy[1] = Math.max(1, PLAYER_BASE.heavy[1] + s.heavy);
    msgs.push(`${s.heavy > 0 ? "💥 重擊力 +" : "💥 重擊力 "}${s.heavy}`);
  }
  if (s.potion) {
    PLAYER_BASE.items.potion = Math.max(0, PLAYER_BASE.items.potion + s.potion);
    msgs.push(`${s.potion > 0 ? "🧪 藥水 +" : "🧪 藥水 "}${s.potion}`);
  }

  // ★新增：STR/DEX/INT/CHA
  ["str","dex","int","cha"].forEach(key => {
    if (s[key]) {
      const statKey = key.toUpperCase();
      STATS[statKey] += s[key];
      msgs.push(`${s[key] > 0 ? `${statKey} +` : `${statKey} `}${s[key]}`);
    }
  });

  if (msgs.length > 0) showStatToast(msgs);
}

function showStatToast(msgs) {
  const el = document.createElement("div");
  el.className = "stat-toast";
  el.innerHTML = msgs.map(m => `<div>${m}</div>`).join("");
  document.getElementById("dialog").appendChild(el);
  setTimeout(() => el.classList.add("show"), 10);
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => el.remove(), 400);
  }, 2200);
}

// ★新增：左上角四維屬性面板（已隱藏旗標清單，避免玩家看到觸發結局的條件）
// 若不需要顯示，把下面這行 elDebugFlags.style.display 改成 "none"，或直接刪除 #debug-flags 相關程式碼
function updateDebugFlags() {
  elDebugFlags.style.display = "block";
  elDebugFlags.innerHTML =
    `力量 ${STATS.STR}　敏捷 ${STATS.DEX}　智力 ${STATS.INT}　魅力 ${STATS.CHA}`;
  // 旗標（FLAGS）不在此顯示，避免暴露結局觸發條件。
  // 如果你自己開發測試需要看旗標狀態，可以暫時加回：
  // + "<br>" + Object.keys(FLAGS).map(k => `${FLAGS[k] ? "✅" : "▫️"} ${k}`).join("　")
}

elScene.addEventListener("click", () => {
  if (isEnded) return;
  if (isTyping) { skipType(); return; }
  if (elScene._battlePending) {
    const id = elScene._battlePending;
    elScene._battlePending    = null;
    elClickHint.style.display = "none";
    startBattle(id);
    return;
  }
  const node = STORY[currentNode];
  if (!node.choices && !node.battle && !node.ending && !node.dynamicEndings && node.next !== null && node.next !== undefined) {
    render(node.next, true);
  }
});

elDialog.addEventListener("click", (e) => {
  if (e.target.closest(".choice-btn") || e.target.closest("#restart-btn") || e.target.closest(".text-input-wrap")) return;
  if (isEnded) return;
  if (isTyping) { skipType(); return; }
  const node = STORY[currentNode];
  if (!node.choices && !node.battle && !node.ending && !node.dynamicEndings && node.next !== null && node.next !== undefined) {
    render(node.next, true);
  }
});

// ════════════════════════════════════════════════════════════════
//  ⚔️ 戰鬥系統（沿用模板，僅敵人資料表改為本作內容）
// ════════════════════════════════════════════════════════════════
function startBattle(enemyId) {
  playBGM(AUDIO_FILES.bgm.battle);
  const eData = ENEMIES[enemyId];
  playerState = {
    currentHp: persistentHp ?? PLAYER_BASE.hp,
    items:     { potion: PLAYER_BASE.items.potion },
    enemyId,
  };
  enemyState = { ...eData, currentHp: eData.hp };

  document.getElementById("player-sprite").textContent = PLAYER_BASE.sprite;
  document.getElementById("player-name").textContent   = PLAYER_BASE.name;
  document.getElementById("enemy-sprite").textContent  = eData.sprite;
  document.getElementById("enemy-name").textContent    = eData.name;
  document.getElementById("battle-stage").style.background = eData.bg;

  updateHpUI();
  updateItemUI();
  setLog(`⚔️ ${eData.name} 出現了！選擇你的行動。`);
  setActionLock(false);
  showBattle();
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function playerAction(type) {
  if (battleLock) return;
  setActionLock(true);

  if (type === "attack") {
    const dmg = rand(...PLAYER_BASE.atk);
    setLog(`你發動攻擊！造成 ${dmg} 點傷害。`);
    playSFX(AUDIO_FILES.sfx.attack);
    animateAttack("player-sprite", "attack-right");
    setTimeout(() => { playSFX(AUDIO_FILES.sfx.hit); dealDmgToEnemy(dmg); }, 400);

  } else if (type === "heavy") {
    if (Math.random() < 0.25) {
      setLog("你全力一擊……但失手了！");
      playSFX(AUDIO_FILES.sfx.miss);
      setTimeout(enemyTurn, 700);
    } else {
      const dmg = rand(...PLAYER_BASE.heavy);
      setLog(`💥 重擊！造成 ${dmg} 點傷害！`);
      playSFX(AUDIO_FILES.sfx.heavy);
      animateAttack("player-sprite", "attack-right");
      setTimeout(() => { playSFX(AUDIO_FILES.sfx.hit); dealDmgToEnemy(dmg); }, 400);
    }

  } else if (type === "flee") {
    if (Math.random() < 0.5) {
      setLog("你趁亂逃跑了！");
      playSFX(AUDIO_FILES.sfx.flee);
      setTimeout(() => { showStory(); render(ENEMIES[playerState.enemyId].onLose, true); }, 1200);
    } else {
      setLog("逃跑失敗！敵人擋住了去路。");
      playSFX(AUDIO_FILES.sfx.miss);
      setTimeout(enemyTurn, 700);
    }
  }
}

function dealDmgToEnemy(dmg) {
  enemyState.currentHp = Math.max(0, enemyState.currentHp - dmg);
  showDmgPopup("enemy-side", dmg, "enemy");
  animateHit("enemy-sprite");
  updateHpUI();
  if (enemyState.currentHp <= 0) { battleEnd(true); return; }
  setTimeout(enemyTurn, 700);
}

function useItem(type) {
  if (battleLock) return;
  if (type === "potion") {
    if (playerState.items.potion <= 0) return;
    setActionLock(true);
    playerState.items.potion--;
    const heal = Math.min(PLAYER_BASE.potionHeal, PLAYER_BASE.hp - playerState.currentHp);
    playerState.currentHp += heal;
    updateItemUI();
    updateHpUI();
    showDmgPopup("player-side", `+${heal}`, "heal");
    playSFX(AUDIO_FILES.sfx.heal);
    setLog(`🧪 使用回復藥水，恢復了 ${heal} 點 HP！`);
    setTimeout(enemyTurn, 700);
  }
}

function enemyTurn() {
  const dmg = rand(...enemyState.atk);
  setLog(`${enemyState.name} 發起攻擊！你受到 ${dmg} 點傷害。`);
  animateAttack("enemy-sprite", "attack-left");
  setTimeout(() => {
    playSFX(AUDIO_FILES.sfx.hit);
    playerState.currentHp = Math.max(0, playerState.currentHp - dmg);
    showDmgPopup("player-side", dmg, "player");
    animateHit("player-sprite");
    updateHpUI();
    if (playerState.currentHp <= 0) { battleEnd(false); return; }
    setActionLock(false);
  }, 400);
}

function battleEnd(win) {
  persistentHp = win ? playerState.currentHp : null;
  setActionLock(true);
  stopBGM();
  playSFX(win ? AUDIO_FILES.sfx.victory : AUDIO_FILES.sfx.defeat);
  const nextNode = win
    ? ENEMIES[playerState.enemyId].onWin
    : ENEMIES[playerState.enemyId].onLose;
  setLog(win ? "🎉 你獲得了勝利！" : "💀 你被擊倒了……");
  setTimeout(() => {
    showStory();
    render(nextNode, true);
  }, 1400);
}

// ── HP / 道具 UI ─────────────────────────────────
function updateHpUI() {
  setHpBar("player", playerState.currentHp, PLAYER_BASE.hp);
  setHpBar("enemy",  enemyState.currentHp,  enemyState.hp);
}
function setHpBar(who, cur, max) {
  const pct = Math.max(0, cur / max * 100);
  const bar  = document.getElementById(`${who}-hp-bar`);
  bar.style.width  = pct + "%";
  bar.className    = "hp-bar " + (pct > 50 ? "green" : pct > 25 ? "yellow" : "red");
  document.getElementById(`${who}-hp-text`).textContent = `${Math.max(0,cur)} / ${max}`;
}
function updateItemUI() {
  const n   = playerState.items.potion;
  document.getElementById("potion-count").textContent = `×${n}`;
  document.getElementById("potion-btn").disabled      = n <= 0;
}
function setLog(msg) { document.getElementById("battle-log-area").textContent = msg; }
function setActionLock(locked) {
  battleLock = locked;
  document.querySelectorAll(".action-btn, .item-btn").forEach(b => b.disabled = locked);
}

// ── 動畫 ─────────────────────────────────────────
function animateAttack(id, cls) {
  const el = document.getElementById(id);
  el.classList.remove("attack-right","attack-left","shake");
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 450);
}
function animateHit(id) {
  const el = document.getElementById(id);
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");
  setTimeout(() => el.classList.remove("shake"), 450);
}
function showDmgPopup(parentId, value, type) {
  const parent = document.getElementById(parentId);
  const el = document.createElement("div");
  el.className    = `dmg-popup ${type}`;
  el.textContent  = type === "heal" ? String(value) : `-${value}`;
  el.style.left   = (30 + Math.random() * 50) + "px";
  el.style.top    = "20px";
  parent.style.position = "relative";
  parent.appendChild(el);
  setTimeout(() => el.remove(), 950);
}
</script>
